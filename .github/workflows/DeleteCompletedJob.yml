name: Delete_Completed_Requests

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  call-api:
    runs-on: ubuntu-latest

    steps:
      - name: Call_API_with_API_KEY
        run: |
          curl --fail "${{ secrets.API_URL }}/api/requests/completed" \
               -H "X-API-KEY: ${{ secrets.CRON_SECRET_KEY }}"
